apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: petclinic-ingress
  # Namespace is set at apply time by ArgoCD (destination.namespace in the Application CRD).
  # For manual apply: kubectl apply -f this file -n petclinic-{env}
  labels:
    app.kubernetes.io/name: petclinic-ingress
    app.kubernetes.io/part-of: petclinic
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/component: networking
  annotations:
    # STEP REQUIRED before applying: replace both placeholders below.
    #   ACM ARN:  terraform -chdir=terraform/environments/dev output -raw acm_certificate_arn
    #   ALB SG:   terraform -chdir=terraform/environments/dev output -raw alb_sg_id
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip

    alb.ingress.kubernetes.io/certificate-arn: "arn:aws:acm:eu-central-1:852396291743:certificate/4cf692e3-be5f-46e5-a468-1d0e45e9d48b"
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}, {"HTTPS": 443}]'
    alb.ingress.kubernetes.io/ssl-redirect: "443"

    # Use the pre-created ALB security group from the VPC module (manages 80/443 ingress rules)
    alb.ingress.kubernetes.io/security-groups: "sg-01e4b7ddd4a040109"

    # Health check targets the Spring Boot Actuator endpoint
    alb.ingress.kubernetes.io/healthcheck-path: /actuator/health
    alb.ingress.kubernetes.io/healthcheck-port: "8080"
    alb.ingress.kubernetes.io/healthcheck-interval-seconds: "15"
    alb.ingress.kubernetes.io/healthcheck-timeout-seconds: "5"
    alb.ingress.kubernetes.io/healthy-threshold-count: "2"
    alb.ingress.kubernetes.io/unhealthy-threshold-count: "3"

    # ALB attributes — cross-zone LB ensures traffic is balanced across both AZs
    alb.ingress.kubernetes.io/load-balancer-attributes: >-
      routing.http.drop_invalid_header_fields.enabled=true,
      load_balancing.cross_zone.enabled=true

    # AWS resource tags applied to the provisioned ALB (required by project tagging policy)
    alb.ingress.kubernetes.io/tags: Project=petclinic,Environment=dev,ManagedBy=terraform
spec:
  ingressClassName: alb
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 8080
