---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: petclinic-alert-rules
  namespace: monitoring
  labels:
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/part-of: petclinic
    app.kubernetes.io/managed-by: kubectl
spec:
  groups:
    - name: petclinic.metric.rules
      rules:
        - alert: ServiceDown
          expr: up == 0
          for: 1m
          labels:
            severity: critical
          annotations:
            summary: "Service {{ $labels.job }} is down"
            description: "{{ $labels.job }} has been unreachable for more than 1 minute."

        - alert: HighErrorRate
          expr: |
            rate(http_server_requests_seconds_count{status=~"5.."}[5m])
            /
            rate(http_server_requests_seconds_count[5m]) > 0.05
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "High 5xx error rate on {{ $labels.job }}"
            description: "{{ $labels.job }} is returning more than 5% 5xx errors over the last 5 minutes."

        - alert: HighLatency
          expr: |
            histogram_quantile(0.95, rate(http_server_requests_seconds_bucket[5m])) > 0.5
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "High p95 latency on {{ $labels.job }}"
            description: "p95 latency on {{ $labels.job }} has exceeded 500ms for 5 minutes."

        - alert: PodRestartLoop
          expr: increase(kube_pod_container_status_restarts_total[15m]) > 3
          for: 0m
          labels:
            severity: critical
          annotations:
            summary: "Pod {{ $labels.pod }} is restarting repeatedly"
            description: "Pod {{ $labels.pod }} in namespace {{ $labels.namespace }} has restarted more than 3 times in 15 minutes."

        - alert: HighMemoryUsage
          expr: |
            container_memory_working_set_bytes
            /
            container_spec_memory_limit_bytes > 0.8
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "High memory usage in {{ $labels.pod }}"
            description: "Container {{ $labels.container }} in pod {{ $labels.pod }} is using more than 80% of its memory limit."

    - name: petclinic.loki.rules
      rules:
        - alert: LogErrorSpike
          expr: |
            rate({namespace=~"petclinic-.*"} |= "ERROR" [5m]) > 0.5
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "High ERROR log rate in petclinic namespace"
            description: "Error log rate has exceeded 0.5/s for 5 minutes in namespace {{ $labels.namespace }}."

        - alert: JVMOutOfMemory
          expr: |
            count_over_time({namespace=~"petclinic-.*"} |= "OutOfMemoryError" [5m]) > 0
          for: 0m
          labels:
            severity: critical
          annotations:
            summary: "JVM OutOfMemoryError detected"
            description: "An OutOfMemoryError was detected in namespace {{ $labels.namespace }}."
