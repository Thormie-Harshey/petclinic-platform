# PETPLAT-74: Spot NodePool for dev — apply AFTER the Graviton free trial expires
#
# The Graviton free trial gives 750 free hours/month on t4g instances until Dec 2026.
# While the trial is active, spot instances provide no cost benefit over on-demand.
#
# When the trial expires:
#   kubectl apply -f k8s/base/karpenter/nodepool-spot-dev.yaml
#
# This replaces the on-demand-only NodePool with one that prefers spot (60-70% cheaper)
# but falls back to on-demand if spot capacity is unavailable.
# The SQS interruption queue (created by terraform/modules/karpenter/) handles
# spot termination warnings — Karpenter drains pods gracefully before AWS reclaims the node.
---
apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: default
  labels:
    app.kubernetes.io/part-of: petclinic
    app.kubernetes.io/managed-by: kubectl
spec:
  template:
    spec:
      requirements:
        - key: kubernetes.io/arch
          operator: In
          values: ["arm64"]
        # Spot preferred — Karpenter picks cheapest available capacity type.
        # Falls back to on-demand automatically if no spot capacity is available.
        - key: karpenter.sh/capacity-type
          operator: In
          values: ["spot", "on-demand"]
        # Two instance families improves spot availability — if t4g.small is fully
        # taken by AWS, Karpenter can use t4g.medium instead of waiting.
        - key: node.kubernetes.io/instance-type
          operator: In
          values: ["t4g.small", "t4g.medium"]
      nodeClassRef:
        group: karpenter.k8s.aws
        kind: EC2NodeClass
        name: default
  # Weight: higher number = higher priority. Karpenter picks this NodePool first
  # because it's cheaper (spot). The base NodePool has no weight set (defaults to 0).
  weight: 10
  limits:
    cpu: "8"
    memory: 32Gi
  disruption:
    consolidationPolicy: WhenEmptyOrUnderutilized
    consolidateAfter: 30s
---
apiVersion: karpenter.k8s.aws/v1
kind: EC2NodeClass
metadata:
  name: default
  labels:
    app.kubernetes.io/part-of: petclinic
    app.kubernetes.io/managed-by: kubectl
spec:
  amiSelectorTerms:
    - alias: al2023@latest
  subnetSelectorTerms:
    - tags:
        karpenter.sh/discovery: "petclinic-dev"
  securityGroupSelectorTerms:
    - tags:
        karpenter.sh/discovery: "petclinic-dev"
  instanceProfile: "petclinic-dev-karpenter-node-profile"
  blockDeviceMappings:
    - deviceName: /dev/xvda
      ebs:
        volumeSize: 20Gi
        volumeType: gp3
        encrypted: true
