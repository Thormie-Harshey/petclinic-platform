apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: openai-api-key
  namespace: petclinic-dev  # Dev-specific — prod equivalent created in E-9 overlays
  labels:
    app.kubernetes.io/name: openai-api-key
    app.kubernetes.io/part-of: petclinic
    app.kubernetes.io/managed-by: kubectl
    app.kubernetes.io/component: infrastructure
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: openai-api-key
    creationPolicy: Owner
  data:
    - secretKey: OPENAI_API_KEY
      remoteRef:
        key: petclinic/dev/openai-api-key
        # No property field — secret is stored as plaintext (the key value itself),
        # not as a JSON object. ESO reads the entire secret string directly.
