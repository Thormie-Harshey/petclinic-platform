apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-rbac-cm
  namespace: argocd
data:
  policy.default: role:readonly
  policy.csv: |
    # Admin role — full access to all apps, clusters, repos, logs, exec
    p, role:admin, applications, *, */*, allow
    p, role:admin, clusters, *, *, allow
    p, role:admin, repositories, *, *, allow
    p, role:admin, logs, get, */*, allow
    p, role:admin, exec, create, */*, allow

    # Developer role — view all apps, sync dev only, no prod sync
    p, role:developer, applications, get, */*, allow
    p, role:developer, applications, sync, default/*-dev, allow
    p, role:developer, logs, get, */*, allow
    p, role:developer, repositories, get, *, allow

    # Map the built-in admin user to the admin role
    g, admin, role:admin
