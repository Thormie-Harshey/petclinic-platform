apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: visits-service-prod
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Thormie-Harshey/petclinic-platform.git
    targetRevision: main
    path: helm/petclinic-service
    helm:
      releaseName: visits-service
      valueFiles:
        - ../../helm-values/visits-service.yaml
        - ../../helm-values/prod.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: petclinic-prod
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - PruneLast=true
      - ApplyOutOfSyncOnly=true
