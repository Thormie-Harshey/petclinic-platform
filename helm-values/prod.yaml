# Prod environment overrides — merged LAST so these win over per-service values.
# Deploy: helm upgrade --install {svc} helm/petclinic-service/ -n petclinic-prod
#         -f helm-values/{service}.yaml -f helm-values/prod.yaml

image:
  registry: "852396291743.dkr.ecr.eu-central-1.amazonaws.com/petclinic-prod"
  pullPolicy: Always
  # tag is set per-service in helm-values/{service}.yaml — CI updates it there

# replicaCount is intentionally NOT set here.
# Each per-service file defines the prod replica count:
#   - config-server, discovery-server, api-gateway, customers, visits, vets: 2
#   - genai-service, admin-server: 1
# This allows per-service files to win when prod.yaml doesn't override.

# autoscaling.enabled is intentionally NOT set here.
# Per-service files set enabled: true for services that have HPA in prod.
# (api-gateway, customers-service, visits-service, vets-service, genai-service)

# podDisruptionBudget.enabled is intentionally NOT set here.
# Per-service files set enabled: true for services that have PDB in prod.
# (config-server, discovery-server, api-gateway, customers, visits, vets)
