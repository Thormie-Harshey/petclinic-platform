image:
  name: discovery-server
  tag: v1.0.0

service:
  port: 8761

component: server
springProfiles: "docker"

configData:
  CONFIG_SERVER_URL: "http://config-server:8888"

initContainers:
  - name: wait-for-config-server
    image: busybox:1.36
    command:
      - sh
      - -c
      - until wget -qO- http://config-server:8888/actuator/health; do sleep 5; done
    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
      readOnlyRootFilesystem: true

env: []

# Prod: 2 replicas + PDB. dev.yaml overrides both back to 1 / false.
replicaCount: 2
podDisruptionBudget:
  enabled: true
