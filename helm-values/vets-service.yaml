image:
  name: vets-service
  tag: v1.0.0

service:
  port: 8083

component: service
springProfiles: "docker,mysql"

configData:
  CONFIG_SERVER_URL: "http://config-server:8888"
  SPRING_DATASOURCE_URL: "jdbc:mysql://petclinic-dev-mysql.cvwkmauk205n.eu-central-1.rds.amazonaws.com:3306/petclinic"

env:
  - name: SPRING_DATASOURCE_USERNAME
    valueFrom:
      secretKeyRef:
        name: rds-credentials
        key: username
  - name: SPRING_DATASOURCE_PASSWORD
    valueFrom:
      secretKeyRef:
        name: rds-credentials
        key: password

initContainers:
  - name: wait-for-config-server
    image: busybox:1.36
    command:
      - sh
      - -c
      - until wget -qO- http://config-server:8888/actuator/health; do sleep 5; done
    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
      readOnlyRootFilesystem: true
  - name: wait-for-discovery-server
    image: busybox:1.36
    command:
      - sh
      - -c
      - until wget -qO- http://discovery-server:8761/actuator/health; do sleep 5; done
    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
      readOnlyRootFilesystem: true

replicaCount: 2
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 4
  targetCPUUtilizationPercentage: 70
podDisruptionBudget:
  enabled: true
